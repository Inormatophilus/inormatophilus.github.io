<!doctype html>
<html lang="de" data-theme="dark" %sveltekit.attributes%>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0e14" id="meta-theme-color" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="GMTW Trail Map — Offline Trail-Karte für das German Muni Trail Weekend" />
    <link rel="icon" href="%sveltekit.assets%/icons/icon-32x32.png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-180x180.png" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <!-- Bunny Fonts (DSGVO-konform, kein Google-Tracking) -->
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link href="https://fonts.bunny.net/css?family=barlow:400,500,600|barlow-condensed:400,600,700&display=swap" rel="stylesheet" />
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <!-- ARIA Live Regions für Barrierefreiheit -->
    <div id="a11y-live-polite" aria-live="polite" aria-atomic="true" class="sr-only"></div>
    <div id="a11y-live-assertive" aria-live="assertive" aria-atomic="true" class="sr-only"></div>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
